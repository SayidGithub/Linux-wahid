name: Buat APK Kali Linux

on:
  workflow_dispatch: 

jobs:
  build:
    name: Merakit APK
    runs-on: ubuntu-22.04

    steps:
      - name: Ambil Source Code
        uses: actions/checkout@v4

      - name: Siapkan Java (Bahan Wajib Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Hapus NDK Bawaan yang Bikin Bentrok
        run: sudo rm -rf /usr/local/lib/android/sdk/ndk/*

      - name: Siapkan NDK Versi Lama
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e
          link-to-sdk: true

      - name: Paksa Sistem Pakai NDK yang Benar
        run: echo "ndk.dir=$ANDROID_NDK_HOME" > local.properties

      - name: Beri Akses Gradle
        run: chmod +x ./gradlew

      - name: Mulai Merakit APK
        run: ./gradlew assembleDebug

      - name: Simpan dan Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Kali-Linux-Mobile
          path: app/build/outputs/apk/debug/*.apk
